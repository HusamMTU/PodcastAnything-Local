name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v0.2.0
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build And Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build wheel artifact
        run: python -m build --wheel

      - name: Upload workflow build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ inputs.tag || github.ref_name }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          append_body: true
          body: |
            See `CHANGELOG.md` in this repository for curated release notes and upgrade guidance.

  publish-container:
    name: Publish Container Image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve release refs
        id: release_ref
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${OWNER}/podcast-anything-local" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.release_ref.outputs.image }}
          tags: |
            type=raw,value=${{ steps.release_ref.outputs.version }}
            type=raw,value=${{ steps.release_ref.outputs.tag }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
