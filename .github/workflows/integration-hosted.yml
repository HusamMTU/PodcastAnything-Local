name: Integration Hosted

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"

permissions:
  contents: read

concurrency:
  group: integration-hosted-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openai-smoke:
    name: OpenAI Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ env.OPENAI_API_KEY != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Skip OpenAI smoke test when secret is missing
        if: ${{ env.OPENAI_API_KEY == '' }}
        run: echo "OPENAI_API_KEY secret is not configured; skipping OpenAI smoke test."

      - name: Install dependencies
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run OpenAI smoke test
        if: ${{ env.OPENAI_API_KEY != '' }}
        env:
          OPENAI_BASE_URL: https://api.openai.com/v1
          OPENAI_MODEL: gpt-4o-mini
        run: python scripts/test_openai_live.py --output data/openai_rewrite_ci.txt

      - name: Upload OpenAI smoke artifact
        if: ${{ env.OPENAI_API_KEY != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: openai-rewrite-smoke
          path: data/openai_rewrite_ci.txt
          if-no-files-found: error

  piper-smoke:
    name: Piper Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,piper]"

      - name: Download Piper voice
        run: python -m piper.download_voices en_US-lessac-high --download-dir data/piper_voices

      - name: Run Piper smoke test
        env:
          TTS_PROVIDER: piper
          PIPER_MODEL_PATH: ./data/piper_voices/en_US-lessac-high.onnx
          PIPER_CONFIG_PATH: ./data/piper_voices/en_US-lessac-high.onnx.json
        run: python scripts/test_piper_local.py --output data/piper_voices/provider_test_ci.wav

      - name: Upload Piper smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: piper-smoke-audio
          path: data/piper_voices/provider_test_ci.wav
          if-no-files-found: error
