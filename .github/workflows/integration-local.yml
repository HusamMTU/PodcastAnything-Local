name: Integration Local Models

on:
  workflow_dispatch:
    inputs:
      ollama_model:
        description: Ollama model to validate on the self-hosted runner
        required: false
        default: gemma3:4b
      piper_voice:
        description: Piper voice to download and test
        required: false
        default: en_US-lessac-high

permissions:
  contents: read

concurrency:
  group: integration-local-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-stack:
    name: Ollama + Piper Self-Hosted Smoke
    runs-on:
      - self-hosted
      - ollama
    timeout-minutes: 60

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,piper]"

      - name: Download Piper voice
        run: python -m piper.download_voices "${{ inputs.piper_voice }}" --download-dir data/piper_voices

      - name: Run Piper local smoke test
        env:
          TTS_PROVIDER: piper
          PIPER_MODEL_PATH: ./data/piper_voices/${{ inputs.piper_voice }}.onnx
          PIPER_CONFIG_PATH: ./data/piper_voices/${{ inputs.piper_voice }}.onnx.json
        run: python scripts/test_piper_local.py --output data/piper_voices/provider_test_ci.wav

      - name: Run Ollama local smoke test
        env:
          REWRITE_PROVIDER: ollama
          OLLAMA_MODEL: ${{ inputs.ollama_model }}
        run: python scripts/test_ollama_local.py --pull-if-missing --model "${{ inputs.ollama_model }}" --output data/ollama_rewrite_ci.txt

      - name: Upload local smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: local-model-smoke
          path: |
            data/ollama_rewrite_ci.txt
            data/piper_voices/provider_test_ci.wav
          if-no-files-found: error
